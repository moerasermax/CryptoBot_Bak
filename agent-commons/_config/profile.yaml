version: "0.4.0"
charter_version: "0.10.1"
preset: standard

# === B1 粒度：條款啟用（standard preset — 22/25 條）===
enabled:
  role-separation: true
  audit-rights: true
  failure-modes: true
  structural-anti-fabrication: true
  violation-reflection: true
  escalation-protocol: true
  evidence-first: true
  output-mode-protocol: true
  completion-delivery: true
  handoff-chain: true
  cross-ai-handoff: true
  role-conflict-resolution: true
  multi-role-tracking: true
  domain-axiom-slot: true
  versioning-migration: true
  working-stack-discipline: true
  maintainer-discipline: false      # maintainer-only：開發階段不啟用
  init-template: true
  ai-vendor-onboarding: true
  individual-learning-loop: true
  diagnose-remediate-protocol: true
  adoption-lifecycle: true
  condition-mutability: true

# === B3 粒度：參數配置（standard 默認值）===
parameters:
  escalation-protocol:
    enhanced_audit_threshold: 2
    structural_failure_threshold: 3
  audit-rights:
    require_stdout_in_normal_mode: true
    allow_trust_boundary_disclosure: true
  violation-reflection:
    block_next_task_until_filed: true
    max_followup_replies: 2
  output-mode-protocol:
    default_mode: verbose
    auto_upgrade_keywords: ["請詳細", "寫真單", "工程模式", "驗證邏輯"]
  failure-modes:
    enable_modes: [F1, F2, F3, F4, F5, F6]

# === Domain axioms 領域公理 ===
domain_axioms:
  primary: protocols/IRON.md
  alias: iron
